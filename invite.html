<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="You've been invited to NORTH">
    <meta property="og:description" content="Your friend invited you to join NORTH — the 1-3-5 productivity system. Use their invite code to get 30 extra days free.">
    <meta property="og:image" content="https://yournorth.app/assets/og-image.png">
    <meta property="og:url" content="https://yournorth.app/invite">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>You've Been Invited to NORTH</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0D1B2A;
            --navy-surface: #1A2B3C;
            --navy-border: #2A3B4C;
            --gold: #C9A84C;
            --gold-light: rgba(201, 168, 76, 0.15);
            --gold-border: rgba(201, 168, 76, 0.35);
            --white: #ECEDEE;
            --muted: #8A9BAC;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        }
        body {
            background: var(--navy);
            color: var(--white);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gold-bar { width: 100%; height: 4px; background: var(--gold); }
        .header {
            width: 100%; max-width: 480px;
            padding: 20px 24px 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--gold);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-text { font-size: 18px; font-weight: 800; color: var(--white); letter-spacing: 2px; }
        .container {
            width: 100%; max-width: 480px;
            padding: 32px 24px; flex: 1;
            display: flex; flex-direction: column; gap: 20px;
        }
        .hero { text-align: center; padding: 8px 0; }
        .hero-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
        .hero-label {
            font-size: 11px; font-weight: 700; color: var(--gold);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
        }
        .hero-title { font-size: 28px; font-weight: 800; color: var(--white); margin-bottom: 8px; line-height: 1.2; }
        .hero-sub { font-size: 15px; color: var(--muted); line-height: 1.6; }

        /* Invite code card */
        .code-card {
            background: var(--navy-surface);
            border: 2px solid var(--gold-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        .code-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; }
        .code-value {
            font-size: 32px; font-weight: 900; color: var(--gold);
            letter-spacing: 4px; font-variant-numeric: tabular-nums;
        }
        .code-bonus {
            font-size: 13px; color: var(--white);
            background: var(--gold-light);
            border: 1px solid var(--gold-border);
            border-radius: 8px; padding: 8px 16px;
        }

        /* Features */
        .features {
            background: var(--navy-surface);
            border: 1px solid var(--navy-border);
            border-radius: 18px; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .features-title { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 2px; }
        .feature-row { display: flex; align-items: flex-start; gap: 12px; }
        .feature-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .feature-text { font-size: 14px; color: var(--white); line-height: 1.4; }
        .feature-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* CTA */
        .cta-section { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .cta-btn {
            display: block; background: var(--gold); color: var(--navy);
            font-size: 17px; font-weight: 800; padding: 18px 36px;
            border-radius: 14px; text-decoration: none; text-align: center;
            width: 100%; transition: opacity 0.15s;
        }
        .cta-btn:hover { opacity: 0.88; }
        .cta-note { font-size: 12px; color: var(--muted); text-align: center; }
        .badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; padding: 10px 16px; text-decoration: none;
            color: var(--white); font-size: 13px; font-weight: 600;
            transition: background 0.15s;
        }
        .badge:hover { background: rgba(255,255,255,0.1); }
        .badge-icon { font-size: 18px; }

        .footer {
            width: 100%; max-width: 480px;
            padding: 16px 24px 32px; text-align: center;
        }
        .footer-text { font-size: 12px; color: var(--muted); }
        .footer-link { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <div class="gold-bar"></div>
    <div class="header">
        <a href="https://yournorth.app" class="logo">
            <div class="logo-icon">🧭</div>
            <span class="logo-text">NORTH</span>
        </a>
    </div>

    <div class="container" id="main-content">
        <!-- Rendered by JS -->
    </div>

    <div class="footer">
        <p class="footer-text">
            <a href="https://yournorth.app" class="footer-link">yournorth.app</a>
            &nbsp;·&nbsp;
            <a href="https://yournorth.app/privacy.html" class="footer-link">Privacy</a>
            &nbsp;·&nbsp;
            <a href="https://yournorth.app/support.html" class="footer-link">Support</a>
        </p>
    </div>

    <script>
        // Extract invite code from path: /invite/CODE or ?code=CODE
        const pathParts = window.location.pathname.split('/');
        const codeFromPath = pathParts[pathParts.length - 1];
        const params = new URLSearchParams(window.location.search);
        const code = (codeFromPath && codeFromPath !== 'invite' && codeFromPath !== 'invite.html')
            ? codeFromPath.toUpperCase()
            : (params.get('code') || '').toUpperCase();

        const container = document.getElementById('main-content');

        container.innerHTML = `
            <div class="hero">
                <span class="hero-emoji">✦</span>
                <div class="hero-label">Personal Invitation</div>
                <div class="hero-title">You've been invited<br>to find your North</div>
                <div class="hero-sub">
                    A friend thinks you'd benefit from NORTH —
                    the 1-3-5 system for people who want to live with intention.
                </div>
            </div>

            ${code ? `
            <div class="code-card">
                <div class="code-label">YOUR INVITE CODE</div>
                <div class="code-value">${escapeHtml(code)}</div>
                <div class="code-bonus">🎁 30 extra days of NORTH Premium — free</div>
            </div>
            ` : ''}

            <div class="features">
                <div class="features-title">WHAT YOU GET WITH NORTH</div>
                <div class="feature-row">
                    <span class="feature-icon">⚓</span>
                    <div>
                        <div class="feature-text">The 1-3-5 System</div>
                        <div class="feature-sub">1 Big Thing, 3 Small Wins, 5 Someday tasks. Clarity every day.</div>
                    </div>
                </div>
                <div class="feature-row">
                    <span class="feature-icon">🧭</span>
                    <div>
                        <div class="feature-text">Sunday Compass</div>
                        <div class="feature-sub">Weekly reflection across Goals, Wins, Challenges, and Lessons.</div>
                    </div>
                </div>
                <div class="feature-row">
                    <span class="feature-icon">💰</span>
                    <div>
                        <div class="feature-text">Safe Number</div>
                        <div class="feature-sub">Know exactly how much you need to feel financially free.</div>
                    </div>
                </div>
                <div class="feature-row">
                    <span class="feature-icon">🤖</span>
                    <div>
                        <div class="feature-text">The Captain — AI Guide</div>
                        <div class="feature-sub">Personalized guidance in 14 languages. Suggests, never manages.</div>
                    </div>
                </div>
            </div>

            <div class="cta-section">
                <a href="https://apps.apple.com/app/north/id6738798530" class="cta-btn">
                    Download NORTH Free →
                </a>
                <div class="cta-note">
                    ${code ? `Enter code <strong style="color:#C9A84C">${escapeHtml(code)}</strong> in the app to claim your 30 bonus days` : 'Free to download · Premium features available'}
                </div>
                <div class="badges">
                    <a href="https://apps.apple.com/app/north/id6738798530" class="badge">
                        <span class="badge-icon">🍎</span> App Store
                    </a>
                    <a href="https://play.google.com/store/apps/details?id=space.manus.north.app" class="badge">
                        <span class="badge-icon">▶</span> Google Play
                    </a>
                </div>
            </div>
        `;

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
